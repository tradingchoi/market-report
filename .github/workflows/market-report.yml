name: Daily Market Report

on:
  schedule:
    # 평일 한국시간 17:10 (UTC 08:10) — 장 마감 데이터 집계 이후
    - cron: '10 8 * * 1-5'
  workflow_dispatch: {}   # 수동 실행 버튼

permissions:
  contents: write   # 차트 PNG를 레포에 커밋하기 위해 필요

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 한글 폰트 설치
        run: sudo apt-get update && sudo apt-get install -y fonts-nanum && sudo fc-cache -f

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 리포트 생성 및 발행
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GITHUB_RAW_BASE: https://raw.githubusercontent.com/${{ github.repository }}/main
        run: python main.py

      - name: 차트 이미지 커밋 (노션 임베드용)
        run: |
          git config user.name "report-bot"
          git config user.email "bot@users.noreply.github.com"
          git add charts/ || true
          git diff --cached --quiet || git commit -m "charts $(date +%F)"
          git push || true
